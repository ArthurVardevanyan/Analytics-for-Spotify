---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-spotify-app
  namespace: analytics-for-spotify
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: analytics-for-spotify
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: spotify
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: analytics-for-spotify
          podSelector:
            matchLabels:
              serving.knative.dev/service: analytics-for-spotify
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: analytics-for-spotify
          podSelector:
            matchLabels:
              app: link-missing-artists
      ports:
        - protocol: TCP
          port: 5432
